<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOEFL 单词记忆大师 - 多模式学习</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* 保留原所有样式变量，并增加新组件 */
        :root {
            --primary-1: #1a5f7a; --secondary-1: #159895; --accent-1: #57c5b6; --bg-1: #e8f6f3; --card-1: #ffffff; --text-1: #2c3e50; --shadow-1: rgba(26, 95, 122, 0.15);
            --primary-2: #6c5ce7; --secondary-2: #a29bfe; --accent-2: #fd79a8; --bg-2: #f0f0f5; --card-2: #ffffff; --text-2: #2d3436; --shadow-2: rgba(108, 92, 231, 0.15);
            --primary-3: #27ae60; --secondary-3: #2ecc71; --accent-3: #f39c12; --bg-3: #e8f8f0; --card-3: #ffffff; --text-3: #1e272e; --shadow-3: rgba(39, 174, 96, 0.15);
            --primary-4: #e67e22; --secondary-4: #f39c12; --accent-4: #e74c3c; --bg-4: #fef5e7; --card-4: #ffffff; --text-4: #2c3e50; --shadow-4: rgba(230, 126, 34, 0.15);
            --primary-5: #2c3e50; --secondary-5: #34495e; --accent-5: #e74c3c; --bg-5: #1a1a2e; --card-5: #16213e; --text-5: #ecf0f1; --shadow-5: rgba(0, 0, 0, 0.3);
            --primary: var(--primary-1); --secondary: var(--secondary-1); --accent: var(--accent-1); --bg: var(--bg-1); --card: var(--card-1); --text: var(--text-1); --shadow: var(--shadow-1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', 'Noto Sans SC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: all 0.5s ease; overflow-x: hidden; }
        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
        .particle { position: absolute; border-radius: 50%; opacity: 0.3; animation: float 15s infinite ease-in-out; }
        @keyframes float { 0%,100%{transform:translateY(0) translateX(0)} 25%{transform:translateY(-30px) translateX(20px)} 50%{transform:translateY(-15px) translateX(-20px)} 75%{transform:translateY(-40px) translateX(15px)}}
        .header { position: fixed; top: 0; left: 0; right: 0; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); z-index: 1000; padding: 12px 16px; box-shadow: 0 2px 20px var(--shadow); }
        .header-content { max-width: 600px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 20px; font-weight: 700; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .icon-btn { width: 36px; height: 36px; border-radius: 50%; border: none; background: var(--bg); color: var(--primary); display: inline-flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; font-size: 16px; margin-left: 8px; }
        .icon-btn:hover { background: var(--primary); color: white; transform: scale(1.05); }
        .main { padding-top: 70px; padding-bottom: 90px; max-width: 600px; margin: 0 auto; position: relative; z-index: 1; }
        /* 模式大厅卡片 */
        .mode-hall { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; padding: 16px; }
        .mode-card { background: var(--card); border-radius: 24px; padding: 20px 12px; text-align: center; box-shadow: 0 8px 20px var(--shadow); transition: all 0.3s ease; cursor: pointer; border: 1px solid transparent; }
        .mode-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .mode-emoji { font-size: 44px; margin-bottom: 12px; }
        .mode-title { font-weight: 700; font-size: 18px; margin-bottom: 6px; }
        .mode-desc { font-size: 12px; color: #888; }
        /* 测验通用样式 */
        .quiz-card { background: var(--card); border-radius: 28px; margin: 16px; padding: 28px 20px; box-shadow: 0 12px 32px var(--shadow); }
        .quiz-question { font-size: 24px; font-weight: 700; text-align: center; margin-bottom: 28px; color: var(--primary); line-height: 1.4; }
        .quiz-options { display: flex; flex-direction: column; gap: 12px; margin: 24px 0; }
        .quiz-option { background: var(--bg); border-radius: 60px; padding: 14px 20px; font-size: 16px; font-weight: 500; text-align: center; cursor: pointer; transition: 0.2s; border: 2px solid transparent; }
        .quiz-option:hover { background: var(--secondary); color: white; transform: scale(1.02); }
        .quiz-option.selected { background: var(--primary); color: white; border-color: var(--accent); }
        .quiz-feedback { text-align: center; margin: 16px 0; font-size: 15px; font-weight: 500; padding: 12px; border-radius: 40px; }
        .feedback-correct { background: rgba(39, 174, 96, 0.2); color: #27ae60; }
        .feedback-wrong { background: rgba(231, 76, 60, 0.2); color: #e74c3c; }
        .quiz-nav { display: flex; gap: 12px; margin-top: 24px; }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        .mistake-list { padding: 16px; }
        .mistake-item { background: var(--card); border-radius: 16px; padding: 14px; margin-bottom: 12px; box-shadow: 0 2px 8px var(--shadow); }
        .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 16px; margin-bottom: 8px; }
        .stat-item { background: var(--card); border-radius: 16px; padding: 12px 8px; text-align: center; box-shadow: 0 4px 15px var(--shadow); }
        .stat-num { font-size: 22px; font-weight: 700; background: linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stat-label { font-size: 11px; color: #888; margin-top: 4px; }
        .btn { flex: 1; padding: 14px 20px; border-radius: 60px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; transition: 0.3s; text-align: center; display: inline-flex; align-items: center; justify-content: center; gap: 6px; }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; box-shadow: 0 4px 15px var(--shadow); }
        .btn-secondary { background: var(--bg); color: var(--primary); border: 2px solid var(--bg); }
        .btn-danger { background: linear-gradient(135deg, #e74c3c, #c0392b); color: white; }
        .btn-success { background: linear-gradient(135deg, #27ae60, #2ecc71); color: white; }
        .toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-100px); background: var(--primary); color: white; padding: 12px 24px; border-radius: 60px; z-index: 3000; transition: 0.3s; opacity: 0; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1500; opacity: 0; visibility: hidden; transition: 0.3s; }
        .overlay.show { opacity: 1; visibility: visible; }
        .theme-panel, .mode-panel { position: fixed; top: 0; right: -100%; width: 100%; max-width: 320px; height: 100vh; background: var(--card); z-index: 2000; transition: 0.4s; overflow-y: auto; }
        .theme-panel.open, .mode-panel.open { right: 0; }
        .back-home { margin: 8px 16px 0; background: var(--bg); border: none; border-radius: 40px; padding: 8px 16px; font-size: 14px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
        @media (max-width: 480px) { .mode-hall { grid-template-columns: 1fr; } .stats-bar { grid-template-columns: repeat(2, 1fr); } }
        [data-theme="5"] .header, [data-theme="5"] .bottom-bar { background: rgba(22,33,62,0.98); }
        [data-theme="5"] .quiz-card, [data-theme="5"] .mode-card { background: #1e3a5f; }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    <div class="toast" id="toast"></div>
    <div class="overlay" id="overlay" onclick="closeAllPanels()"></div>
    <header class="header">
        <div class="header-content">
            <div class="logo">📚 TOEFL Master</div>
            <div style="display: flex;">
                <button class="icon-btn" onclick="toggleThemePanel()">🎨</button>
                <button class="icon-btn" onclick="showMistakeNotebook()">📓</button>
                <button class="icon-btn" onclick="goHome()">🏠</button>
            </div>
        </div>
    </header>
    <main class="main" id="main"></main>

    <!-- 主题面板 -->
    <div class="theme-panel" id="themePanel"><div class="panel-header" style="padding:20px;display:flex;justify-content:space-between;"><h3>主题</h3><button class="panel-close" onclick="closeAllPanels()">✕</button></div><div class="theme-list" id="themeList"></div></div>
    <!-- 错题本侧栏 -->
    <div class="theme-panel" id="mistakePanel" style="right:-100%;"><div class="panel-header"><h3>📘 错题本</h3><button onclick="closeAllPanels()">✕</button></div><div id="mistakeListContainer" style="padding:16px;"></div><div style="padding:16px;"><button class="btn btn-primary" id="reviewMistakesBtn" onclick="startMistakeReview()">开始错题练习</button></div></div>

    <script>
        // ---------- 全局变量 ----------
        let words = [];
        let currentView = "home"; // home, learning, quiz, classic
        let activeQuizMode = null; // "word2meaning", "meaning2word", "example2word"
        let currentQuizQuestion = null;
        let quizSelectedOption = null;
        let quizFeedback = null;
        let mistakeNotebook = []; // { wordIndex, mode, wrongAnswer, correctAnswer, timestamp, questionText }
        
        // 经典背单词相关
        let classicMode = 'normal'; // normal, spell, mask, review, shuffle
        let currentClassicIndex = 0;
        let favorites = [], difficult = [], learned = {}, mastered = {};
        let classicWordList = [];
        
        // 存储键
        const STORAGE = {
            favorites: 'toefl_favorites', difficult: 'toefl_difficult', learned: 'toefl_learned', mastered: 'toefl_mastered',
            mistakes: 'toefl_mistakes', classicIndex: 'toefl_currentIndex', theme: 'toefl_theme', classicMode: 'toefl_classicMode'
        };
        function loadStorage() {
            favorites = JSON.parse(localStorage.getItem(STORAGE.favorites) || '[]');
            difficult = JSON.parse(localStorage.getItem(STORAGE.difficult) || '[]');
            learned = JSON.parse(localStorage.getItem(STORAGE.learned) || '{}');
            mastered = JSON.parse(localStorage.getItem(STORAGE.mastered) || '{}');
            mistakeNotebook = JSON.parse(localStorage.getItem(STORAGE.mistakes) || '[]');
            currentClassicIndex = parseInt(localStorage.getItem(STORAGE.classicIndex) || '0');
            classicMode = localStorage.getItem(STORAGE.classicMode) || 'normal';
        }
        function saveAll() {
            localStorage.setItem(STORAGE.favorites, JSON.stringify(favorites));
            localStorage.setItem(STORAGE.difficult, JSON.stringify(difficult));
            localStorage.setItem(STORAGE.learned, JSON.stringify(learned));
            localStorage.setItem(STORAGE.mastered, JSON.stringify(mastered));
            localStorage.setItem(STORAGE.mistakes, JSON.stringify(mistakeNotebook));
            localStorage.setItem(STORAGE.classicIndex, currentClassicIndex);
            localStorage.setItem(STORAGE.classicMode, classicMode);
        }
        
        // 辅助函数
        function showToast(msg) { let t = document.getElementById('toast'); t.innerText = msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }
        function closeAllPanels() { document.querySelectorAll('.theme-panel').forEach(p=>p.classList.remove('open')); document.getElementById('overlay').classList.remove('show'); }
        function toggleThemePanel() { document.getElementById('themePanel').classList.toggle('open'); document.getElementById('overlay').classList.toggle('show'); initThemeList(); }
        function initThemeList() { let container = document.getElementById('themeList'); if(!container)return; container.innerHTML = ['深海蓝','暮光紫','森林绿','暖阳橙','暗夜黑'].map((name,i)=>{ let id=i+1; return `<div class="theme-item" onclick="setTheme(${id})"><div class="theme-preview" style="background:linear-gradient(135deg,var(--primary-${id}),var(--secondary-${id}));"></div><div><h4>${name}</h4></div></div>`; }).join(''); }
        function setTheme(id) { document.body.setAttribute('data-theme',id); let root=document.documentElement; for(let i=1;i<=5;i++){ if(i===id){ root.style.setProperty('--primary',`var(--primary-${i})`); root.style.setProperty('--secondary',`var(--secondary-${i})`); root.style.setProperty('--accent',`var(--accent-${i})`); root.style.setProperty('--bg',`var(--bg-${i})`); root.style.setProperty('--card',`var(--card-${i})`); root.style.setProperty('--text',`var(--text-${i})`); root.style.setProperty('--shadow',`var(--shadow-${i})`); } } localStorage.setItem(STORAGE.theme,id); showToast('主题已切换'); closeAllPanels(); }
        
        // 首页渲染模式大厅
        function renderHome() {
            currentView = "home";
            const modes = [
                { emoji:"📖", title:"经典背单词", desc:"卡片学习 + 拼写/遮罩", action:()=>enterClassicMode() },
                { emoji:"🎯", title:"单词选含义", desc:"根据英文选正确中文", action:()=>startQuiz("word2meaning") },
                { emoji:"🔤", title:"含义选单词", desc:"根据中文选正确英文", action:()=>startQuiz("meaning2word") },
                { emoji:"📝", title:"例句选单词", desc:"根据例句选出正确单词", action:()=>startQuiz("example2word") },
                { emoji:"⭐", title:"错题本复习", desc:"重做错题巩固记忆", action:()=>startMistakeReview() },
                { emoji:"🎲", title:"随机挑战", desc:"混合题型随机抽测", action:()=>startRandomChallenge() }
            ];
            let stats = `<div class="stats-bar"><div class="stat-item"><div class="stat-num">${words.length}</div><div class="stat-label">总词库</div></div>
            <div class="stat-item"><div class="stat-num">${Object.keys(learned).length}</div><div class="stat-label">已学习</div></div>
            <div class="stat-item"><div class="stat-num">${Object.keys(mastered).length}</div><div class="stat-label">已掌握</div></div>
            <div class="stat-item"><div class="stat-num">${favorites.length}</div><div class="stat-label">收藏</div></div></div>`;
            let hall = `<div class="mode-hall">` + modes.map(m => `<div class="mode-card" onclick="(${m.action.toString()})()"><div class="mode-emoji">${m.emoji}</div><div class="mode-title">${m.title}</div><div class="mode-desc">${m.desc}</div></div>`).join('') + `</div>`;
            document.getElementById('main').innerHTML = stats + hall;
        }
        
        // 进入经典背单词模式 (保留原样)
        function enterClassicMode() {
            if(!words.length) return showToast("单词数据加载中");
            classicWordList = [...words];
            if(classicMode === 'shuffle') shuffleClassicList();
            else if(classicMode === 'review') { classicWordList = words.filter((_,i)=>difficult.includes(i)||favorites.includes(i)); if(!classicWordList.length){ showToast("无复习单词"); return; } }
            if(currentClassicIndex >= classicWordList.length) currentClassicIndex = 0;
            currentView = "classic";
            renderClassicWord();
        }
        function shuffleClassicList(){ for(let i=classicWordList.length-1;i>0;i--){ let j=Math.floor(Math.random()*(i+1)); [classicWordList[i],classicWordList[j]]=[classicWordList[j],classicWordList[i]]; } }
        function renderClassicWord(){
            if(!classicWordList.length) return;
            let w = classicWordList[currentClassicIndex];
            let realIdx = words.findIndex(ww=>ww['单词']===w['单词']);
            let isFav = favorites.includes(realIdx), isDiff = difficult.includes(realIdx);
            let html = `<div class="word-card"><div class="word-header"><div><div class="word-title">${w['单词']}</div><div class="word-phonetic">/${w['读音']}/</div></div><div><button class="action-btn" onclick="toggleClassicFavorite(${realIdx})">${isFav?'⭐':'☆'}</button><button class="action-btn" onclick="playWordAudio('${w['单词']}')">🔊</button></div></div>`;
            if(classicMode === 'mask') html+=`<div class="meaning-box mask-content" onclick="this.classList.toggle('reveal')"><div>${w['单词中文意思']}</div></div><div class="mask-hint">点击显示释义</div>`;
            else html+=`<div class="meaning-box"><div>${w['单词中文意思']}</div></div>`;
            if(w['记忆方法']) html+=`<div class="memory-card"><div>💡 ${w['记忆方法']}</div></div>`;
            if(w['搭配短语']) html+=`<div><span class="tag">${w['搭配短语']}</span></div>`;
            if(w['例句']) html+=`<div class="example-box"><div>📝 ${w['例句']}</div>${w['例句中文含义']?`<div>${w['例句中文含义']}</div>`:''}</div>`;
            if(classicMode === 'spell') html+=`<input type="text" id="spellInput" class="spell-input" placeholder="听发音后拼写单词" onkeypress="if(event.key==='Enter') checkSpellClassic('${w['单词']}')"><button class="btn btn-primary" onclick="checkSpellClassic('${w['单词']}')">检查拼写</button>`;
            html+=`<div style="margin-top:12px;">${isDiff?'<span class="tag">🤔难词</span>':''}${mastered[realIdx]?'<span class="tag">✅已掌握</span>':''}</div></div>`;
            document.getElementById('main').innerHTML = html + `<div style="position:fixed; bottom:70px; left:0; right:0; max-width:600px; margin:0 auto; display:flex; gap:10px; padding:12px; background:var(--card); border-radius:60px; box-shadow:0 -2px 12px var(--shadow); z-index:100;"><button class="btn btn-secondary" onclick="prevClassic()">◀ 上一个</button><button class="btn btn-danger" onclick="markDifficultClassic(${realIdx})">🤔 难词</button><button class="btn btn-success" onclick="markMasteredClassic(${realIdx})">✅ 掌握</button><button class="btn btn-primary" onclick="nextClassic()">下一个 ▶</button></div>`;
            saveAll();
        }
        function toggleClassicFavorite(idx){ let pos=favorites.indexOf(idx); pos===-1?favorites.push(idx):favorites.splice(pos,1); saveAll(); renderClassicWord(); updateHomeStats(); }
        function markDifficultClassic(idx){ if(!difficult.includes(idx)) difficult.push(idx); else difficult=difficult.filter(i=>i!==idx); saveAll(); renderClassicWord(); }
        function markMasteredClassic(idx){ mastered[idx]=true; learned[idx]=true; difficult=difficult.filter(i=>i!==idx); saveAll(); renderClassicWord(); setTimeout(()=>nextClassic(),600); }
        function prevClassic(){ if(currentClassicIndex>0) currentClassicIndex--; else currentClassicIndex=classicWordList.length-1; renderClassicWord(); }
        function nextClassic(){ if(currentClassicIndex<classicWordList.length-1) currentClassicIndex++; else currentClassicIndex=0; renderClassicWord(); saveAll(); }
        function checkSpellClassic(correctWord){ let input=document.getElementById('spellInput'); if(!input) return; if(input.value.trim().toLowerCase()===correctWord.toLowerCase()){ showToast("✅拼写正确"); markMasteredClassic(words.findIndex(w=>w['单词']===correctWord)); }else{ showToast(`❌正确: ${correctWord}`); let idx=words.findIndex(w=>w['单词']===correctWord); if(idx!==-1 && !difficult.includes(idx)) difficult.push(idx); saveAll(); } input.value=''; }
        function playWordAudio(word){ new Audio(`https://dict.youdao.com/dictvoice?type=2&audio=${encodeURIComponent(word)}`).play().catch(e=>showToast("发音失败")); }
        
        // ---------- 新测验模块 (单词选义/含义选词/例句选词) ----------
        async function startQuiz(mode){
            if(!words.length){ showToast("单词加载中"); return; }
            activeQuizMode = mode;
            currentView = "quiz";
            generateQuizQuestion();
        }
        function generateQuizQuestion(){
            if(!words.length) return;
            let randomIndex = Math.floor(Math.random() * words.length);
            let wordObj = words[randomIndex];
            let correctAnswer = '';
            let questionText = '';
            let options = [];
            if(activeQuizMode === 'word2meaning'){
                questionText = `📖 "${wordObj['单词']}" 的含义是？`;
                correctAnswer = wordObj['单词中文意思'];
                let otherMeanings = words.filter((_,i)=>i!==randomIndex).map(w=>w['单词中文意思']).filter(v=>v && v!==correctAnswer);
                let distinct = [...new Set([correctAnswer, ...otherMeanings])];
                options = distinct.slice(0,4);
                if(options.length<4) options=[correctAnswer, "持续的", "明显的", "丰富的"].slice(0,4);
                options = shuffleArray(options);
            } 
            else if(activeQuizMode === 'meaning2word'){
                questionText = `🔤 "${wordObj['单词中文意思']}" 对应的英文单词是？`;
                correctAnswer = wordObj['单词'];
                let otherWords = words.filter((_,i)=>i!==randomIndex).map(w=>w['单词']).filter(v=>v && v!==correctAnswer);
                options = [...new Set([correctAnswer, ...otherWords])].slice(0,4);
                if(options.length<4) options=[correctAnswer, "abandon", "benevolent", "catalyst"].slice(0,4);
                options = shuffleArray(options);
            }
            else if(activeQuizMode === 'example2word'){
                if(!wordObj['例句'] || wordObj['例句'].trim()===''){
                    generateQuizQuestion(); return;
                }
                questionText = `📝 根据例句选出合适的单词：<br>“${wordObj['例句']}”`;
                correctAnswer = wordObj['单词'];
                let otherWords = words.filter((_,i)=>i!==randomIndex).map(w=>w['单词']).filter(v=>v && v!==correctAnswer);
                options = [...new Set([correctAnswer, ...otherWords])].slice(0,4);
                if(options.length<4) options=[correctAnswer, "prevalent", "mitigate", "ambiguous"].slice(0,4);
                options = shuffleArray(options);
            }
            currentQuizQuestion = { wordIndex: randomIndex, correct: correctAnswer, options, questionText, mode: activeQuizMode, wordObj };
            quizSelectedOption = null;
            quizFeedback = null;
            renderQuizUI();
        }
        function shuffleArray(arr){ for(let i=arr.length-1;i>0;i--){ let j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }
        function renderQuizUI(){
            if(!currentQuizQuestion) return;
            let optsHtml = currentQuizQuestion.options.map(opt => `<div class="quiz-option" data-value="${escapeHtml(opt)}" onclick="selectQuizOption('${escapeHtml(opt)}')">${opt}</div>`).join('');
            let feedbackHtml = quizFeedback ? `<div class="quiz-feedback ${quizFeedback.type}">${quizFeedback.message}</div>` : '';
            let nextBtn = quizFeedback ? `<button class="btn btn-primary" onclick="nextQuizQuestion()">下一题 ▶</button>` : `<button class="btn btn-primary" onclick="submitQuizAnswer()">提交答案</button>`;
            let html = `<div class="quiz-card"><div class="quiz-question">${currentQuizQuestion.questionText}</div><div class="quiz-options" id="quizOptions">${optsHtml}</div>${feedbackHtml}<div class="quiz-nav">${nextBtn}<button class="btn btn-secondary" onclick="goHome()">🏠 返回首页</button></div></div>`;
            document.getElementById('main').innerHTML = html;
            if(quizSelectedOption) document.querySelectorAll('.quiz-option').forEach(el=>{ if(el.dataset.value === quizSelectedOption) el.classList.add('selected'); });
        }
        function selectQuizOption(opt){ quizSelectedOption = opt; renderQuizUI(); }
        function submitQuizAnswer(){
            if(!quizSelectedOption){ showToast("请选择一个选项"); return; }
            let isCorrect = (quizSelectedOption === currentQuizQuestion.correct);
            if(isCorrect){
                quizFeedback = { type:"feedback-correct", message:"✅ 回答正确！很棒！" };
                // 正确时自动记录掌握（可选）但不要增加错题
                showToast("✓ 正确");
            } else {
                quizFeedback = { type:"feedback-wrong", message:`❌ 错误！正确答案：${currentQuizQuestion.correct}` };
                // 记录错题
                let mistake = {
                    wordIndex: currentQuizQuestion.wordIndex,
                    mode: activeQuizMode,
                    wrongAnswer: quizSelectedOption,
                    correctAnswer: currentQuizQuestion.correct,
                    timestamp: Date.now(),
                    questionText: currentQuizQuestion.questionText.replace(/<br>/g,' ')
                };
                mistakeNotebook.unshift(mistake);
                if(mistakeNotebook.length > 200) mistakeNotebook.pop();
                saveAll();
                showToast("已加入错题本");
            }
            renderQuizUI();
        }
        function nextQuizQuestion(){ generateQuizQuestion(); }
        
        // 随机挑战 (混合三种题型)
        async function startRandomChallenge(){
            if(!words.length) return;
            let modes = ["word2meaning","meaning2word","example2word"];
            activeQuizMode = modes[Math.floor(Math.random()*3)];
            currentView = "quiz";
            generateQuizQuestion();
        }
        
        // 错题本功能
        function showMistakeNotebook(){
            let container = document.getElementById('mistakeListContainer');
            if(!mistakeNotebook.length){ container.innerHTML = '<div style="text-align:center;padding:40px;">📭 暂无错题，继续挑战吧！</div>'; }
            else {
                container.innerHTML = mistakeNotebook.slice(0,50).map((m,idx)=>`<div class="mistake-item"><div><strong>${getWordByIndex(m.wordIndex)?.单词 || '未知单词'}</strong></div><div style="font-size:13px;">❌ 你的答案: ${m.wrongAnswer}<br>✅ 正确答案: ${m.correctAnswer}</div><div style="font-size:11px;color:#888;">${new Date(m.timestamp).toLocaleString()}</div><button class="btn btn-secondary" style="margin-top:8px;padding:6px;" onclick="retryMistake(${idx})">重练本题</button></div>`).join('');
            }
            document.getElementById('mistakePanel').classList.add('open');
            document.getElementById('overlay').classList.add('show');
        }
        function getWordByIndex(idx){ return words[idx] || null; }
        function retryMistake(idx){
            let mistake = mistakeNotebook[idx];
            if(!mistake) return;
            activeQuizMode = mistake.mode;
            // 重新构建当前题目
            let word = words[mistake.wordIndex];
            if(!word){ showToast("单词不存在"); return; }
            let correctAnswer = mistake.correctAnswer;
            let options = [];
            if(mistake.mode === 'word2meaning'){
                let others = words.filter((_,i)=>i!==mistake.wordIndex).map(w=>w['单词中文意思']).filter(v=>v && v!==correctAnswer);
                options = [...new Set([correctAnswer, ...others])].slice(0,4);
                if(options.length<4) options=[correctAnswer,"复杂","简单","重要"].slice(0,4);
                currentQuizQuestion = { wordIndex: mistake.wordIndex, correct: correctAnswer, options: shuffleArray(options), questionText: `📖 "${word['单词']}" 的含义是？`, mode: mistake.mode, wordObj: word };
            } else if(mistake.mode === 'meaning2word'){
                let others = words.filter((_,i)=>i!==mistake.wordIndex).map(w=>w['单词']).filter(v=>v && v!==correctAnswer);
                options = [...new Set([correctAnswer, ...others])].slice(0,4);
                if(options.length<4) options=[correctAnswer,"abandon","benevolent","catalyst"].slice(0,4);
                currentQuizQuestion = { wordIndex: mistake.wordIndex, correct: correctAnswer, options: shuffleArray(options), questionText: `🔤 "${word['单词中文意思']}" 对应的英文单词是？`, mode: mistake.mode, wordObj: word };
            } else if(mistake.mode === 'example2word'){
                let others = words.filter((_,i)=>i!==mistake.wordIndex).map(w=>w['单词']).filter(v=>v && v!==correctAnswer);
                options = [...new Set([correctAnswer, ...others])].slice(0,4);
                if(options.length<4) options=[correctAnswer,"prevalent","mitigate","ambiguous"].slice(0,4);
                currentQuizQuestion = { wordIndex: mistake.wordIndex, correct: correctAnswer, options: shuffleArray(options), questionText: `📝 根据例句选出单词：<br>“${word['例句']}”`, mode: mistake.mode, wordObj: word };
            }
            quizSelectedOption = null; quizFeedback = null; currentView = "quiz"; closeAllPanels(); renderQuizUI();
        }
        function startMistakeReview(){
            if(!mistakeNotebook.length){ showToast("暂无错题，先去做题吧"); return; }
            // 抽取第一个错题复习
            retryMistake(0);
        }
        
        // 更新全局统计显示在首页
        function updateHomeStats(){ if(currentView === 'home') renderHome(); }
        
        // 辅助转义
        function escapeHtml(str){ return String(str).replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
        
        function goHome(){ renderHome(); saveAll(); }
        
        // 加载单词数据 + 初始化
        async function loadWordsAndStart(){
            let paths = ['toefl_vocabulary.json','./toefl_vocabulary.json','../toefl_vocabulary.json','data/toefl_vocabulary.json'];
            for(let p of paths){
                try{
                    let resp = await fetch(p);
                    if(resp.ok){ words = await resp.json(); break; }
                }catch(e){}
            }
            if(!words.length){ document.getElementById('main').innerHTML = `<div class="word-card"><h3>⚠️ 未找到单词文件</h3><p>请确保 toefl_vocabulary.json 存在</p><button class="btn btn-primary" onclick="location.reload()">重试</button></div>`; return; }
            loadStorage();
            let savedTheme = localStorage.getItem(STORAGE.theme) || 1;
            setTheme(parseInt(savedTheme));
            createParticles();
            renderHome();
        }
        function createParticles(){ let container=document.getElementById('particles'); let colors=['var(--primary)','var(--secondary)','var(--accent)']; for(let i=0;i<15;i++){ let p=document.createElement('div'); p.className='particle'; p.style.left=Math.random()*100+'%'; p.style.top=Math.random()*100+'%'; p.style.width=(Math.random()*20+5)+'px'; p.style.height=p.style.width; p.style.background=colors[Math.floor(Math.random()*colors.length)]; p.style.animationDelay=Math.random()*15+'s'; container.appendChild(p); } }
        window.onload = loadWordsAndStart;
        // 暴露全局方法
        window.goHome=goHome; window.toggleThemePanel=toggleThemePanel; window.closeAllPanels=closeAllPanels; window.setTheme=setTheme;
        window.enterClassicMode=enterClassicMode; window.startQuiz=startQuiz; window.startRandomChallenge=startRandomChallenge;
        window.selectQuizOption=selectQuizOption; window.submitQuizAnswer=submitQuizAnswer; window.nextQuizQuestion=nextQuizQuestion;
        window.toggleClassicFavorite=toggleClassicFavorite; window.markDifficultClassic=markDifficultClassic; window.markMasteredClassic=markMasteredClassic;
        window.prevClassic=prevClassic; window.nextClassic=nextClassic; window.checkSpellClassic=checkSpellClassic; window.playWordAudio=playWordAudio;
        window.showMistakeNotebook=showMistakeNotebook; window.retryMistake=retryMistake; window.startMistakeReview=startMistakeReview;
        window.generateQuizQuestion=generateQuizQuestion; window.renderQuizUI=renderQuizUI;
    </script>
</body>
</html>
