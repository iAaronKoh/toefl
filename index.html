<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOEFL 单词记忆</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <svg width="0" height="0" style="position:absolute;">
        <defs>
            <linearGradient id="progressGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:var(--primary);stop-opacity:1" />
                <stop offset="100%" style="stop-color:var(--accent);stop-opacity:1" />
            </linearGradient>
        </defs>
    </svg>
</head>
<body>
    <div class="particles" id="particles"></div>
    <div class="toast" id="toast">提示</div>
    <div class="overlay" id="overlay" onclick="closePanels()"></div>

    <header class="header">
        <div class="header-content">
            <div class="logo">🎓 TOEFL 词匠</div>
            <div class="search-wrap">
                <input type="text" id="searchInput" placeholder="🔍 搜索单词 / 释义..." onkeyup="doSearch()">
            </div>
            <div class="header-actions">
                <button class="icon-btn" id="statBtn" title="学习统计"><span>📊</span></button>
                <button class="icon-btn" id="listBtn" title="单词列表"><span>📋</span></button>
                <button class="icon-btn" id="settingBtn" title="设置"><span>⚙️</span></button>
                <button class="icon-btn" id="themeToggleBtn" title="切换主题"><span>🎨</span></button>
                <button class="icon-btn" id="mistakeBtn" title="错题本">
                    <span>📘</span>
                    <span class="badge" id="mistakeBadge" style="display:none">0</span>
                </button>
                <button class="icon-btn" id="homeBtn" title="首页"><span>🏠</span></button>
            </div>
        </div>
    </header>

    <main class="main" id="main"></main>

    <div class="side-panel" id="themePanel">
        <div class="panel-header">
            <h3>🎨 主题风格</h3>
            <button class="panel-close" onclick="closePanels()">✕</button>
        </div>
        <div id="themeList"></div>
    </div>

    <div class="side-panel" id="mistakePanel">
        <div class="panel-header">
            <h3>📘 错题本</h3>
            <button class="panel-close" onclick="closePanels()">✕</button>
        </div>
        <div id="mistakeListContainer"></div>
        <button class="btn btn-primary" id="reviewMistakesBtn" style="width:100%; margin-top:16px;">📖 开始错题复习</button>
        <button class="btn btn-ghost btn-sm" onclick="clearAllMistake()" style="width:100%; margin-top:8px;">🗑️ 清空错题</button>
    </div>

    <div class="side-panel" id="settingPanel">
        <div class="panel-header">
            <h3>⚙️ 系统设置</h3>
            <button class="panel-close" onclick="closePanels()">✕</button>
        </div>
        <div class="setting-card">
            <p>📝 字体大小</p>
            <div class="action-group">
                <button class="btn btn-sm btn-secondary" onclick="setFontSize(14, true)">小</button>
                <button class="btn btn-sm btn-secondary" onclick="setFontSize(16, true)">中</button>
                <button class="btn btn-sm btn-secondary" onclick="setFontSize(18, true)">大</button>
            </div>
        </div>
        <div class="setting-card">
            <p>🔊 朗读语速</p>
            <div class="action-group">
                <button class="btn btn-sm btn-secondary" onclick="setSpeechRate(0.7)">慢速</button>
                <button class="btn btn-sm btn-secondary" onclick="setSpeechRate(0.9)">正常</button>
                <button class="btn btn-sm btn-secondary" onclick="setSpeechRate(1.1)">快速</button>
            </div>
        </div>
    </div>

    <div class="side-panel" id="statPanel">
        <div class="panel-header">
            <h3>📊 学习统计</h3>
            <button class="panel-close" onclick="closePanels()">✕</button>
        </div>
        <div id="statContent" class="stat-board"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
